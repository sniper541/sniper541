<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Карта путешественника</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap">
</head>
<body class="dark-mode">
    <div id="logo" style="position: absolute; top: 10px; left: 50%; transform: translateX(-50%); z-index: 1000; font-size: 24px; font-weight: 700; color: #bb86fc; text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.3);">Travel Map</div>
    <div id="map" style="height: 100vh; width: 100%;"></div>
    <div id="controls">
        <div id="toggle-edit">
            <label class="switch">
                <input type="checkbox" id="edit-mode-toggle">
                <span class="slider round"></span>
            </label>
            <span>Режим редактирования</span>
        </div>
        <input type="text" id="search" placeholder="Поиск места..." style="margin-left: 10px; padding: 5px;">
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="script.js"></script>
</body>
</html>
